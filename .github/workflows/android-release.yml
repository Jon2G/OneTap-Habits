name: Android Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT_PATH: 'src/OneTapHabits.csproj'

jobs:
  build-android:
    permissions: write-all
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode Keystore
        run: |
          $keystoreBytes = [Convert]::FromBase64String("${{ secrets.ANDROID_KEYSTORE_BASE64 }}")
          [IO.File]::WriteAllBytes("src/onetaphabits.keystore", $keystoreBytes)
        shell: pwsh

      - name: Decode google-services.json
        if: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 != '' }}
        run: |
          $jsonBytes = [Convert]::FromBase64String("${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}")
          [IO.File]::WriteAllBytes("src/google-services.json", $jsonBytes)
        shell: pwsh

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Get version from tag
        id: get_version
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "VERSION=${{ github.event.inputs.version }}" >> $env:GITHUB_OUTPUT
          } else {
            $version = "${{ github.ref_name }}".TrimStart('v')
            echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          }
        shell: pwsh

      - name: Build Android Release
        run: |
          $ver = "${{ steps.get_version.outputs.VERSION }}"
          $parts = $ver -split '\.'
          $vc = [int]$parts[0] * 10000 + [int]$parts[1] * 100 + [int]$parts[2]
          dotnet publish ${{ env.PROJECT_PATH }} -f net9.0-android -c Release -o ./artifacts -p:ApplicationVersion=$vc -p:ApplicationDisplayVersion=$ver
        shell: pwsh
        env:
          ANDROID_SIGNING_PASSWORD: ${{ secrets.ANDROID_SIGNING_PASSWORD }}

      - name: Rename APK
        id: rename_apk
        run: |
          $newName = "OneTapHabits-v${{ steps.get_version.outputs.VERSION }}.apk"
          $stableName = "OneTapHabits.apk"
          $apk = Get-ChildItem -Path ./artifacts -Filter "*-Signed.apk" | Select-Object -First 1
          if (-not $apk) {
            $apk = Get-ChildItem -Path ./artifacts -Filter "*.apk" | Select-Object -First 1
          }
          if ($apk) {
            Rename-Item -Path $apk.FullName -NewName $newName
            Copy-Item -Path "./artifacts/$newName" -Destination "./artifacts/$stableName" -Force
          }
        shell: pwsh

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: ./artifacts/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && format('v{0}', github.event.inputs.version) || github.ref_name }}
          name: OneTap Habits v${{ steps.get_version.outputs.VERSION }}
          generate_release_notes: true
          files: ./artifacts/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
