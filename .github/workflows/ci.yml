name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'global.json'
      - 'global.ci.json'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'global.json'
      - 'global.ci.json'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: '9.0.203'
  PROJECT_PATH: src/OneTapHabits.csproj

jobs:
  build:
    name: Build MAUI Android
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Apply CI SDK pin
        run: cp global.ci.json global.json

      - name: Prepare google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > src/google-services.json
          else
            cp src/google-services.json.example src/google-services.json
          fi
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - name: Restore workloads
        run: dotnet workload restore ${{ env.PROJECT_PATH }}

      - name: Restore dependencies
        run: |
          dotnet restore ${{ env.PROJECT_PATH }} -p:TargetFramework=net9.0-android
          dotnet restore src/OneTapHabits.Core/OneTapHabits.Core.csproj

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} -f net9.0-android -c Debug --no-restore

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Apply CI SDK pin
        run: cp global.ci.json global.json

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json

      - name: Test
        run: dotnet test tests/OneTapHabits.Tests/OneTapHabits.Tests.csproj -c Release --verbosity minimal
