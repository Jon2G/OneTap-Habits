<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 456 456" role="img" aria-hidden="true">
  <style>
    .logo-shapes {
      opacity: 0.85;
      mix-blend-mode: multiply;
    }

    .logo-shape {
      fill: #22C55E;
    }

    @media (prefers-color-scheme: dark) {
      .logo-shapes {
        mix-blend-mode: screen;
      }

      .logo-shape {
        fill: #4ADE80;
      }
    }
  </style>

  <g class="logo-shapes">
    <circle class="logo-shape" cx="130" cy="125" r="52" />
    <rect class="logo-shape" x="72" y="292" width="200" height="48" rx="24" />
    <rect class="logo-shape" x="148" y="210" width="180" height="48" rx="24" />
    <rect class="logo-shape" x="224" y="128" width="160" height="48" rx="24" />
  </g>
</svg>
